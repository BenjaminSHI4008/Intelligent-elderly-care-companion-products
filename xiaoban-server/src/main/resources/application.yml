server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/xiaoban_mvp?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:xiaoban-mvp-secret-key-2026}
  expiration: 604800000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

ai:
  provider: dashscope
  api-key: ${AI_API_KEY}
  model: qwen-turbo
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
  max-tokens: 500
  temperature: 0.7

jpush:
  app-key: ${JPUSH_APP_KEY}
  master-secret: ${JPUSH_MASTER_SECRET}
