    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:xiaoban-test-secret-2026}
  expiration: 604800000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

ai:
