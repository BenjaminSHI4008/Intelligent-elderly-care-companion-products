  api-key: ${AI_API_KEY:sk-ws-H.REXLEYX.tcxY.MEQCIDJb4lUKt1X-TJg_5n4Ne7uU01gqP7A6YPGagzQ411JEAiABwX9mE-OwF11fdksf3mVJQuTONyS6FeWsjM0jtvirxw}
  model: qwen-turbo
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
  max-tokens: 500
